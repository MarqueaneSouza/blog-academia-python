<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Post Detail</title>
</head>
<body>
    <h1>{{ post.titulo }}</h1>
    <h3>{{ post.subtitulo }} - {{ post.autor }}</h3>

    <p>
        {{ post.conteudo|safe}} #safe: diz que tudo que estiver aqui dentro deverá ser interpretado como um código html.
    </p>
</body>
</html>
